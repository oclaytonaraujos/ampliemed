# Supabase project configuration
# Docs: https://supabase.com/docs/guides/cli/config

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = ["https://localhost:3000"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10

# ─── Edge Functions ───────────────────────────────────────────────────────────
# verify_jwt = false bypasses the Supabase gateway JWT check.
# Auth is handled inside the function code via supabase.auth.getUser(jwt).
# This prevents "Invalid JWT" gateway rejections when the client session
# was created before a JWT secret rotation.

[functions.evolution_send_message]
verify_jwt = false

[functions.evolution_webhook]
verify_jwt = false
